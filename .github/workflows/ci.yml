name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript check (app)
        run: npx tsc -p . --noEmit
      - name: TypeScript check (convex)
        run: npx tsc -p convex --noEmit
      - name: Lint
        run: npx eslint src/ convex/ --ext .ts,.tsx
      - name: Unit tests
        run: npx vitest run --reporter verbose
      - name: Build
        run: npx vite build
